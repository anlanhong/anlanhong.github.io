                        ${isAdmin ? `<div class="img-actions"><button data-action="set-cover" data-img-id="${w.id}">封面</button><button data-action="delete-album-img" data-img-id="${w.id}" class="danger">删除</button></div>` : ''}
                        <img src="${w.data}" alt="${escapeHTML(w.name)}" class="blur-up" onload="this.classList.add('loaded')">
                        <div class="card-info"><span class="card-name" title="${escapeHTML(w.name)}">${escapeHTML(w.name)}</span><span class="card-date">${formatDate(w.dateAdded)}</span></div>
                    </div>`;
                    }
                    h += '</div>';
                }
                h += '</div>';
                return h;
            }
            function openLightboxInAlbum(albumId, imgIdx) {
                const album = appData.works.find(w => w.id === albumId);
                if (!album || !album.images || imgIdx >= album.images.length) return;
                const imgId = album.images[imgIdx].id;
                openLightbox(imgId, albumLightboxImages);
            }

            // ==================== 画册管理 ====================
            function createAlbum() {
                const name = prompt('请输入画册名称');
                if (!name || !name.trim()) return;
                appData.works.unshift({
                    id: generateId(), type: 'album', name: name.trim(),
                    extension: 'album', coverImage: null, dateAdded: Date.now(),
                    description: '', size: 0, images: []
                });
                saveToLocal(); renderPage(); showToast('画册已创建');
            }
            function renameAlbum(albumId) {
                const album = appData.works.find(w => w.id === albumId);
                if (!album) return;
                const newName = prompt('重命名画册', album.name);
                if (!newName || !newName.trim()) return;
                album.name = newName.trim();
                saveToLocal(); renderAlbumLightbox(album);
            }
            async function addImagesToAlbum(albumId, files) {
                const album = appData.works.find(w => w.id === albumId);
                if (!album) return;
                if (!album.images) album.images = [];
                let added = 0;
                const newImgs = []; // 批量收集避免循环内多次 unshift
                for (const file of files) {
                    const ext = getExtension(file.name);
                    if (!IMAGE_EXTENSIONS.has(ext)) continue;
                    try {
                        const dataUrl = await readFileAsBase64(file);
                        const img = {
                            id: generateId(), name: file.name, data: dataUrl,
                            mimeType: file.type || 'image/' + ext, size: file.size,
                            dateAdded: Date.now(), extension: ext, description: '',
                        };
                        try {
                            const dims = await getImageDimensions(dataUrl);
                            if (dims) { img.imgWidth = dims.w; img.imgHeight = dims.h; }
                        } catch(e) {}
                        newImgs.push(img);
                        added++;
                        if (!album.coverImage) album.coverImage = dataUrl;
                    } catch(err) { /* 文件处理失败 */ }
                }
                // 一次性倒序插入
                album.images.unshift(...newImgs.reverse());
                if (added > 0) {
                    albumLightboxImages = album.images;
                    saveToLocal();
                    renderAlbumLightbox(album);
                    showToast('已添加 ' + added + ' 张图片');
                }
            }
            function uploadToAlbum(albumId) {
                const input = document.createElement('input');
                input.type = 'file'; input.multiple = true; input.accept = 'image/*';
                input.onchange = () => {
                    if (input.files.length > 0) addImagesToAlbum(albumId, Array.from(input.files));
                };
                input.click();
            }
            function moveImageToAlbum(imgId, albumId) {
                const imgIdx = appData.works.findIndex(w => w.id === imgId && w.type === 'image');
                if (imgIdx < 0) return;
                const album = appData.works.find(w => w.id === albumId && w.type === 'album');
                if (!album) return;
                if (!album.images) album.images = [];
                const [imgWork] = appData.works.splice(imgIdx, 1);
                album.images.unshift(imgWork);
                if (!album.coverImage) album.coverImage = imgWork.data;
                saveToLocal(); renderPage(); showToast('已移至"' + album.name + '"');
            }
            function setAlbumCover(albumId, imgId) {
                const album = appData.works.find(w => w.id === albumId);
                if (!album || !album.images) return;
                const img = album.images.find(x => x.id === imgId);
                if (!img) return;
                album.coverImage = img.data;
                albumLightboxImages = album.images;
                saveToLocal();
                renderAlbumLightbox(album);
                showToast('封面已设置');
            }
            function deleteAlbumImage(albumId, imgId) {
                const album = appData.works.find(w => w.id === albumId);
                if (!album || !album.images) return;
                if (!confirm('确定从画册中删除此图片？')) return;
                const img = album.images.find(x => x.id === imgId);
                album.images = album.images.filter(x => x.id !== imgId);
                if (img && album.coverImage === img.data) {
                    album.coverImage = album.images.length > 0 ? album.images[0].data : null;
                }
                albumLightboxImages = album.images;
                saveToLocal();
                renderAlbumLightbox(album);
                showToast('已删除');
            }
            function showAlbumPicker(imgId) {
                const albums = appData.works.filter(w => w.type === 'album');
                if (albums.length === 0) {
                    showToast('请先创建一个画册', 'warning');
                    return;
                }
                const overlay = document.createElement('div');
                overlay.className = 'modal-form-overlay';
                overlay.innerHTML = `
                    <div class="modal-form-card">
                        <h3>移至画册</h3>
                        <div class="album-picker-list">
                            ${albums.map(a => `<button class="album-picker-item" data-album-id="${a.id}">${escapeHTML(a.name)} ${a.images?'('+a.images.length+'张)':''}</button>`).join('')}
                        </div>
                        <div class="modal-form-actions">
                            <button class="btn btn-ghost btn-sm" id="albumPickerCancel">取消</button>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);
                overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
                document.getElementById('albumPickerCancel').addEventListener('click', () => overlay.remove());
                overlay.querySelectorAll('.album-picker-item').forEach(btn => {
                    btn.addEventListener('click', () => {
                        moveImageToAlbum(imgId, btn.dataset.albumId);
                        overlay.remove();
                    });
                });
            }
            window.createAlbum = createAlbum;

            // ==================== 关于我编辑 ====================
            function editSectionTitle(sectionId) {
                const sec=appData.profile.sections.find(s=>s.id===sectionId); if(!sec) return;
                const titleEl=document.querySelector(`.profile-card-title[data-id="${sectionId}"]`);
                if(!titleEl) return;
                const input=document.createElement('input');
                input.value=sec.title; input.id='editTitleInput_'+sectionId;
                titleEl.innerHTML=''; titleEl.appendChild(input);
                input.focus(); input.select();
                input.addEventListener('blur',()=>finishEditTitle(sectionId,input.value));
                input.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ e.preventDefault(); finishEditTitle(sectionId,input.value); } });
            }
            function finishEditTitle(sectionId,newTitle) {
                const sec=appData.profile.sections.find(s=>s.id===sectionId); if(!sec) return;
                const val=newTitle.trim(); if(val) sec.title=val;
                saveToLocal(); renderPage();
            }
            function editSectionContent(sectionId) {
                const sec=appData.profile.sections.find(s=>s.id===sectionId); if(!sec) return;
                const contentEl=document.querySelector(`.card-content[data-id="${sectionId}"]`);
                if(!contentEl) return;
                const wrap=contentEl.parentElement;
                const ta=document.createElement('textarea');
                ta.className='card-content-textarea'; ta.value=sec.content; ta.id='editContentTextarea_'+sectionId;
                autoResizeTextarea(ta);
                ta.addEventListener('input',()=>autoResizeTextarea(ta));
                contentEl.style.display='none'; wrap.appendChild(ta);
                ta.focus();
                ta.addEventListener('blur',()=>finishEditContent(sectionId,ta));
                ta.addEventListener('keydown',(e)=>{ if(e.key==='Escape'){ e.preventDefault(); finishEditContent(sectionId,ta); } });
            }
            function finishEditContent(sectionId,ta) {
                const sec=appData.profile.sections.find(s=>s.id===sectionId); if(!sec) return;
                if(ta&&ta.value!==undefined) sec.content=ta.value;
                saveToLocal(); renderPage();
            }
            function editProfileHeader() {
                const name=prompt('姓名/大标题',appData.profile.name);
                if(name!==null) appData.profile.name=name;
                const subtitle=prompt('副标题/简介',appData.profile.subtitle);
                if(subtitle!==null) appData.profile.subtitle=subtitle;
                saveToLocal(); renderPage();
            }
            function addProfileSection() {
                const id='sec_'+Date.now(); const title=prompt('新栏目标题','新栏目');
                if(!title) return;
                appData.profile.sections.push({ id, icon:'*', title, content:'在此输入内容' });
                saveToLocal(); renderPage();
            }
            window.editProfileHeader=editProfileHeader;
            window.addProfileSection=addProfileSection;

            // ==================== 管理 ====================
            function toggleAdmin() {
                if(isAdmin){ isAdmin=false; document.body.classList.remove('admin-mode'); renderPage(); return; }
                const pwd=prompt('输入管理密码');
                if(pwd==='admin'){ isAdmin=true; document.body.classList.add('admin-mode'); renderPage(); showToast('管理模式已开启'); }
                else if(pwd!==null){ showToast('密码错误','error'); }
            }

            // ==================== 页面切换 ====================
            document.getElementById('navTabs').addEventListener('click',(e)=>{
                const tab=e.target.closest('.nav-tab'); if(!tab) return;
                currentPage=tab.dataset.page; renderPage();
            });
            adminToggle.addEventListener('click', toggleAdmin);

            fileInput.addEventListener('change',()=>{ if(fileInput.files.length>0){ addFiles(fileInput.files); fileInput.value=''; } });

            // 全局拖拽上传
            let dragCounter=0;
            document.addEventListener('dragenter',(e)=>{ e.preventDefault(); dragCounter++; if(dragCounter===1) dropHighlight.style.display='flex'; });
            document.addEventListener('dragleave',(e)=>{ e.preventDefault(); dragCounter--; if(dragCounter<=0){ dragCounter=0; dropHighlight.style.display='none'; } });
            document.addEventListener('dragover',(e)=>{ e.preventDefault(); });
            document.addEventListener('drop',(e)=>{ e.preventDefault(); dragCounter=0; dropHighlight.style.display='none'; if(e.dataTransfer.files.length>0) addFiles(e.dataTransfer.files); });

            // 粘贴上传
            document.addEventListener('paste',(e)=>{
                const items=e.clipboardData?.items; if(!items) return;
                const files=[]; for(const item of items){ if(item.kind==='file'){ const f=item.getAsFile(); if(f) files.push(f); } }
                if(files.length>0){ e.preventDefault(); addFiles(files); }
            });

            // 全局键盘无障碍：Enter/Space 激活可交互卡片
            document.addEventListener('keydown',(e)=>{
                if(e.key!=='Enter'&&e.key!==' ') return;
                const card = e.target.closest('[role="button"][data-action]');
                if(!card || card.tagName==='BUTTON'||card.tagName==='A'||card.tagName==='INPUT') return;
                if(e.target.closest('button')||e.target.closest('input')||e.target.closest('textarea')) return;
                e.preventDefault();
                card.click();
            });

            // ==================== 初始化 ====================
            async function init() {
                const fromJSON=await loadFromJSON(); if(!fromJSON) loadFromLocal();
                if(!appData.works||!appData.profile){ appData={ works:[], profile:JSON.parse(JSON.stringify(DEFAULT_PROFILE)) }; }
                if(!_localStorageAvailable) showToast('浏览器存储不可用，数据不会持久保存','warning');

                // 若无作品则添加测试数据
                if (appData.works.length === 0) {
                    const testImgs = [
                        { seed:'a', w:400, h:600, name:'城市天际线' },
                        { seed:'b', w:400, h:300, name:'山间小屋' },
                        { seed:'c', w:400, h:400, name:'几何图案' },
                        { seed:'d', w:400, h:500, name:'秋日森林' },
                        { seed:'e', w:400, h:250, name:'海岸日落' },
                        { seed:'f', w:400, h:350, name:'老街巷子' },
                        { seed:'g', w:400, h:700, name:'摩天轮夜景' },
                        { seed:'h', w:400, h:280, name:'咖啡与书' },
                    ];
                    for (const t of testImgs) {
                        appData.works.push({
                            id:'test_'+t.seed, type:'image',
                            name:t.name,
                            data:'https://picsum.photos/seed/'+t.seed+'/'+t.w+'/'+t.h,
                            imgWidth:t.w, imgHeight:t.h,
                            size:0, dateAdded:Date.now(), extension:'jpg', description:'',
                        });
                    }
                    // 添加一个测试画册
                    appData.works.push({
                        id: 'test_album_1', type: 'album', name: '旅行纪念册',
                        extension: 'album', coverImage: 'https://picsum.photos/seed/travel/400/500',
                        dateAdded: Date.now(), description: '', size: 0,
                        images: [
                            { id:'test_ai_1', name:'机场日出', data:'https://picsum.photos/seed/apt1/400/300', imgWidth:400, imgHeight:300, size:0, dateAdded:Date.now(), extension:'jpg', description:'清晨的机场候机大厅' },
                            { id:'test_ai_2', name:'古城小巷', data:'https://picsum.photos/seed/oldtown/400/600', imgWidth:400, imgHeight:600, size:0, dateAdded:Date.now(), extension:'jpg', description:'石板路与红灯笼' },
                            { id:'test_ai_3', name:'海景餐厅', data:'https://picsum.photos/seed/seaside/400/350', imgWidth:400, imgHeight:350, size:0, dateAdded:Date.now(), extension:'jpg', description:'' },
                        ]
                    });
                }

                renderPage();
            }
            init();

            // 响应式：窗口大小变化时重新布局瀑布流
            // 将 onclick 所需函数暴露到全局作用域
            window.exportFullData = exportFullData;
            window.createAlbum = createAlbum;
            window.editProfileHeader = editProfileHeader;
            window.addProfileSection = addProfileSection;

            let _resizeTimer = null;
            window.addEventListener('resize', () => {
                if (currentPage !== 'images') return;
                clearTimeout(_resizeTimer);
                _resizeTimer = setTimeout(() => renderPage(), 250);
            });
        })();
    </script>
</body>
</html>
